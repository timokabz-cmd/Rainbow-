<title>Rainbow Elementary School – Mutundwe, Kampala</title>
<meta name="description" content="Rainbow Elementary School, Kabawo Zone, Kweba Road, Mutundwe – quality nursery and primary education in Kampala, Uganda. Call 0772 504012."/>

<style>
:root{
  --navy:#0D2B5E;
  --blue:#1A6BAE;
  --sky:#E8F3FB;
  --gold:#E8A020;
  --gold-lt:#FEF3DC;
  --green:#1E8449;
  --white:#FFFFFF;
  --off:#F7F8FA;
  --text:#1A1F2E;
  --muted:#5A677D;
  --border:#DDE3EE;
  --r:10px;
  --shadow:0 4px 28px rgba(13,43,94,.10);
  --shadow-sm:0 2px 12px rgba(13,43,94,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;color:var(--text);background:var(--white);line-height:1.7;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block;object-fit:cover}
a{color:var(--blue);text-decoration:none}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.2}

/* TICKER */
.ticker-wrap{background:var(--navy);overflow:hidden;padding:10px 0;position:relative}
.ticker-inner{display:flex;animation:ticker 30s linear infinite;white-space:nowrap}
.ticker-item{color:rgba(255,255,255,.9);font-size:.78rem;font-weight:500;padding:0 48px;letter-spacing:.03em}
.ticker-item::before{content:'🌈 ';}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* RAINBOW BAR */
.rainbow-bar{height:5px;background:linear-gradient(to right,#E03F3F 0%,#E03F3F 14.3%,#F5A623 14.3%,#F5A623 28.6%,#F9E000 28.6%,#F9E000 42.9%,#28A060 42.9%,#28A060 57.1%,#1A6BAE 57.1%,#1A6BAE 71.4%,#2B3F9E 71.4%,#2B3F9E 85.7%,#7B4DB8 85.7%,#7B4DB8 100%)}

/* NAV */
nav{background:#fff;position:sticky;top:0;z-index:200;border-bottom:1px solid var(--border)}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:76px}
.nav-brand{display:flex;align-items:center;gap:14px}
.nav-logo-ring{width:52px;height:52px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo-svg{width:38px;height:38px}
.brand-text{line-height:1.2}
.brand-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--navy)}
.brand-sub{font-size:.72rem;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.nav-menu{display:flex;align-items:center;gap:2px;list-style:none}
.nav-menu a{display:block;padding:8px 14px;font-size:.875rem;font-weight:500;color:var(--text);border-radius:6px;transition:background .2s,color .2s;white-space:nowrap}
.nav-menu a:hover{background:var(--sky);color:var(--blue)}
.nav-cta{background:var(--navy)!important;color:#fff!important;padding:9px 22px!important;border-radius:8px!important}
.nav-cta:hover{background:var(--blue)!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;border:none;background:none}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:.3s}
